name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - run: npm test

  # figma-agent is an in-repo npm workspace (the optional Figma authoring "hands").
  # Typecheck + build it on its own job so the workspace can't silently rot; the
  # four `ui` gates in `check` above are left exactly as they were.
  figma-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck --workspace=figma-agent
      - run: npm run build --workspace=figma-agent

  # recall is the optional semantic-memory workspace (the "mind"). It needs Node 22
  # because it reads the ledger index through the built-in `node:sqlite`; the `ui`
  # binary itself keeps its Node 20 floor and never imports any of this.
  # The embed-integration tests download a model, so they stay opt-in via RECALL_E2E=1;
  # the pure ranking suite always runs.
  recall:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck --workspace=recall
      - run: npm run build --workspace=recall
      - run: npx vitest run --config recall/vitest.config.ts

  # a11y is the optional tier-2 RENDERED accessibility workspace (axe-core over a real browser).
  # It uses Playwright `channel:chrome` against the runner's preinstalled Google Chrome, so no
  # browser download is needed (PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD keeps `npm ci` fast). The browser
  # suite self-skips when Chrome is absent (the has-chrome probe), so the job stays green on images
  # without it; ubuntu-latest ships Chrome, so the rendered audit runs for real here. The `ui`
  # binary never imports this workspace and stays browser-free.
  a11y:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
      - run: npm run typecheck --workspace=a11y
      - run: npm run build --workspace=a11y
      - run: npx vitest run --config a11y/vitest.config.ts

  # design-os is the Python umbrella CLI (the "conductor") over the deterministic `ui` kernel.
  # It shells out to the linked binary, so `npm run build` + `npm link` must put `ui` on PATH
  # before the uv-managed pytest suite runs (pixelshot-backed integration tests self-skip when
  # that hand is absent). The four `ui` gates in `check` above are left exactly as they were.
  design-os:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm link
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
        working-directory: design-os
      - run: uv run pytest -q
        working-directory: design-os
