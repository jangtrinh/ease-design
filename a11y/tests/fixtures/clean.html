<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Clean fixture</title>
</head>
<body>
  <main>
    <h1>Accessible sample</h1>
    <!-- Strong contrast (#111 on #fff ≈ 18:1) and a real alt text — no axe violations under
         the wcag2a/wcag2aa rule set. Structural best-practice rules are NOT in that set. -->
    <p style="color:#111111;background-color:#ffffff;">
      This paragraph has strong colour contrast that passes WCAG AA comfortably.
    </p>
    <img src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" alt="A one-pixel spacer">
  </main>
</body>
</html>
